services:
  app:
    build: .
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
      APP_BEARER_TOKEN: westech-secret-token
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: products_db
      DB_USER: app_user
      DB_PASSWORD: app_password
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8000"
    command: php -S 0.0.0.0:8000 -t public
    user: "1000:1000"

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: PaSSword!2026
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 5
